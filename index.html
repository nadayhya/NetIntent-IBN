<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetIntent AI - Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="logo-wrapper">
                <h1 class="brand-name">NetIntent <span>AI</span></h1>
            </div>
            <div class="status-box">
                <span class="pulse-dot"></span>
                <span class="status-text">Online</span>
            </div>
        </div>
    </header>

    <main class="chat-display" id="chatDisplay">
        <div class="message bot-message">
           System Ready. Enter intent to update network policies, Admin.
        </div>
    </main>

  
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <footer class="chat-input-area">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Enter your intent here..." autocomplete="off">
            <button class="send-button" id="sendBtn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
